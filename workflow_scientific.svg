<svg width="1000" height="1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1000" height="1000" fill="#ffffff" />
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#444" />
    </marker>
  </defs>

  <!-- BLOCK 1: SOURCES -->
  <g transform="translate(300, 30)">
    <rect x="0" y="0" width="400" height="100" rx="8" fill="#f8f9fa" stroke="#333" stroke-width="1.5" />
    <text x="200" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">☁️ Copernicus CMEMS Sources</text>
    <line x1="20" y1="35" x2="380" y2="35" stroke="#ddd" />
    <text x="200" y="55" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">3D Models: IBI (2.5 km), MEDSEA (4.2 km), GLO (9 km)</text>
    <text x="200" y="75" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">2D Observations: MED, BAL, ATL, BS L4 SST (1 km)</text>
  </g>

  <!-- BLOCK 2: INGESTION -->
  <g transform="translate(400, 160)">
    <rect x="0" y="0" width="200" height="60" rx="5" fill="#e9ecef" stroke="#333" stroke-width="1.5" />
    <text x="100" y="25" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Data Acquisition</text>
    <text x="100" y="45" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" font-style="italic">fetch_copernicus.py</text>
  </g>

  <!-- BLOCK 3: PROCESSING (3 SYMMETRIC BLOCKS) -->
  
  <!-- 2D SST Column -->
  <g transform="translate(100, 280)">
    <rect x="0" y="0" width="220" height="60" rx="5" fill="#dee2e6" stroke="#333" stroke-width="1.5" />
    <text x="110" y="25" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">2D Mosaic Engine</text>
    <text x="110" y="45" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" font-style="italic">build_mesh.py</text>
  </g>

  <!-- 3D Temp Column -->
  <g transform="translate(390, 280)">
    <rect x="0" y="0" width="220" height="60" rx="5" fill="#dee2e6" stroke="#333" stroke-width="1.5" />
    <text x="110" y="25" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">3D Mesh Engine</text>
    <text x="110" y="45" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" font-style="italic">build_mesh_3d.py</text>
  </g>

  <!-- Local DTO Column -->
  <g transform="translate(680, 280)">
    <rect x="0" y="0" width="220" height="60" rx="5" fill="#dee2e6" stroke="#333" stroke-width="1.5" />
    <text x="110" y="25" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Local Digital Twin</text>
    <text x="110" y="45" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" font-style="italic">build_obsea_local_dto.py</text>
  </g>

  <!-- BLOCK 4: DATASETS (Side by side) -->
  
  <g transform="translate(100, 380)">
    <path d="M0,5 Q0,0 5,0 L215,0 Q220,0 220,5 L220,35 Q220,40 215,40 L5,40 Q0,40 0,35 Z" fill="#fff" stroke="#007bff" stroke-width="1.5" stroke-dasharray="5,3" />
    <text x="110" y="25" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#007bff">EUROPE_SST_UNIFIED.nc</text>
  </g>

  <g transform="translate(390, 380)">
    <path d="M0,5 Q0,0 5,0 L215,0 Q220,0 220,5 L220,35 Q220,40 215,40 L5,40 Q0,40 0,35 Z" fill="#fff" stroke="#007bff" stroke-width="1.5" stroke-dasharray="5,3" />
    <text x="110" y="25" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#007bff">EUROPE_TOTAL_3D_TEMP.nc</text>
  </g>

  <g transform="translate(680, 380)">
    <path d="M0,5 Q0,0 5,0 L215,0 Q220,0 220,5 L220,35 Q220,40 215,40 L5,40 Q0,40 0,35 Z" fill="#fff" stroke="#007bff" stroke-width="1.5" stroke-dasharray="5,3" />
    <text x="110" y="25" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#007bff">OBSEA_LOCAL_DTO_3D.nc</text>
  </g>

  <!-- BLOCK 5: SCIENTIFIC VISUALIZATION (Divided per dataset) -->
  
  <g transform="translate(100, 460)">
    <rect x="0" y="0" width="220" height="100" rx="5" fill="#f1f3f5" stroke="#adb5bd" stroke-width="1" />
    <text x="110" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">SST Visualization</text>
    <line x1="20" y1="30" x2="200" y2="30" stroke="#ddd" />
    <text x="20" y="50" font-family="Arial, sans-serif" font-size="10">• Surface Maps</text>
    <text x="20" y="65" font-family="Arial, sans-serif" font-size="10">• Regional Comparisons</text>
    <text x="20" y="80" font-family="Arial, sans-serif" font-size="9" font-style="italic">plot_unified_sst.py</text>
  </g>

  <g transform="translate(390, 460)">
    <rect x="0" y="0" width="220" height="100" rx="5" fill="#f1f3f5" stroke="#adb5bd" stroke-width="1" />
    <text x="110" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">3D Temp Visualization</text>
    <line x1="20" y1="30" x2="200" y2="30" stroke="#ddd" />
    <text x="20" y="50" font-family="Arial, sans-serif" font-size="10">• Vertical Profiles (CTD)</text>
    <text x="20" y="65" font-family="Arial, sans-serif" font-size="10">• Depth Layer Collage</text>
    <text x="20" y="80" font-family="Arial, sans-serif" font-size="9" font-style="italic">plot_3d_layers.py / profile.py</text>
  </g>

  <g transform="translate(680, 460)">
    <rect x="0" y="0" width="220" height="100" rx="5" fill="#f1f3f5" stroke="#adb5bd" stroke-width="1" />
    <text x="110" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">DTO Local Visualization</text>
    <line x1="20" y1="30" x2="200" y2="30" stroke="#ddd" />
    <text x="20" y="50" font-family="Arial, sans-serif" font-size="10">• High-Res Local Maps</text>
    <text x="20" y="65" font-family="Arial, sans-serif" font-size="10">• Model Comparison</text>
    <text x="20" y="80" font-family="Arial, sans-serif" font-size="9" font-style="italic">plot_obsea_local_dto.py</text>
  </g>

  <!-- BLOCK 6: ERDDAP SERVICE (Final Output) -->
  <g transform="translate(300, 620)">
    <rect x="0" y="0" width="400" height="80" rx="10" fill="#212529" stroke="#000" stroke-width="1" />
    <text x="200" y="35" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#ffffff">🌐 ERDDAP Service (Containerized)</text>
    <line x1="50" y1="45" x2="350" y2="45" stroke="#444" />
    <text x="200" y="65" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#00d2ff" font-weight="bold">Unified Europe SST | Unified 3D Temp | OBSEA Local DTO</text>
  </g>

  <!-- CONNECTORS -->
  
  <!-- Source to Fetch -->
  <line x1="500" y1="130" x2="500" y2="158" stroke="#444" stroke-width="1.5" marker-end="url(#arrowhead)" />
  
  <!-- Fetch to 3 Processing Blocks -->
  <path d="M500,220 L500,240 L210,240 L210,278" fill="none" stroke="#444" stroke-width="1.5" marker-end="url(#arrowhead)" />
  <line x1="500" y1="220" x2="500" y2="278" stroke="#444" stroke-width="1.5" marker-end="url(#arrowhead)" />
  <path d="M500,220 L500,240 L790,240 L790,278" fill="none" stroke="#444" stroke-width="1.5" marker-end="url(#arrowhead)" />
  
  <!-- Processing to Datasets -->
  <line x1="210" y1="340" x2="210" y2="378" stroke="#444" stroke-width="1.5" marker-end="url(#arrowhead)" />
  <line x1="500" y1="340" x2="500" y2="378" stroke="#444" stroke-width="1.5" marker-end="url(#arrowhead)" />
  <line x1="790" y1="340" x2="790" y2="378" stroke="#444" stroke-width="1.5" marker-end="url(#arrowhead)" />
  
  <!-- Datasets to Vis -->
  <line x1="210" y1="420" x2="210" y2="458" stroke="#444" stroke-width="1.5" marker-end="url(#arrowhead)" />
  <line x1="500" y1="420" x2="500" y2="458" stroke="#444" stroke-width="1.5" marker-end="url(#arrowhead)" />
  <line x1="790" y1="420" x2="790" y2="458" stroke="#444" stroke-width="1.5" marker-end="url(#arrowhead)" />
  
  <!-- Datasets to ERDDAP (Final Convergence) -->
  <path d="M210,420 L210,580 L400,580 L400,618" fill="none" stroke="#007bff" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowhead)" />
  <line x1="500" y1="560" x2="500" y2="618" stroke="#007bff" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowhead)" />
  <path d="M790,420 L790,580 L600,580 L600,618" fill="none" stroke="#007bff" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowhead)" />

</svg>
