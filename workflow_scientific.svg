<svg width="1200" height="950" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="950" fill="#ffffff" />
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#444" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.1" />
    </filter>
  </defs>

  <!-- BLOCK 1: SOURCES (Subgraph-like) -->
  <rect x="50" y="20" width="1100" height="150" rx="10" fill="#f8f9fa" stroke="#ced4da" stroke-width="1" stroke-dasharray="5,5" />
  <text x="600" y="45" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#495057">☁️ Copernicus CMEMS Sources</text>
  
  <g transform="translate(100, 70)">
    <rect x="0" y="0" width="200" height="70" rx="5" fill="#ffffff" stroke="#333" stroke-width="1.2" filter="url(#shadow)" />
    <text x="100" y="25" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">IBI-ANALYSISFORECAST</text>
    <text x="100" y="40" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">(Atlantic-Iberian)</text>
    <text x="100" y="58" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#007bff">2.5 km | 3D</text>
  </g>
  <g transform="translate(350, 70)">
    <rect x="0" y="0" width="200" height="70" rx="5" fill="#ffffff" stroke="#333" stroke-width="1.2" filter="url(#shadow)" />
    <text x="100" y="25" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">MED-ANALYSISFORECAST</text>
    <text x="100" y="40" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">(Mediterranean)</text>
    <text x="100" y="58" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#007bff">4.2 km | 3D</text>
  </g>
  <g transform="translate(600, 70)">
    <rect x="0" y="0" width="200" height="70" rx="5" fill="#ffffff" stroke="#333" stroke-width="1.2" filter="url(#shadow)" />
    <text x="100" y="25" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">GLO-ANALYSISFORECAST</text>
    <text x="100" y="40" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">(Global Physics)</text>
    <text x="100" y="58" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#007bff">9 km | 3D Fallback</text>
  </g>
  <g transform="translate(850, 70)">
    <rect x="0" y="0" width="200" height="70" rx="5" fill="#ffffff" stroke="#333" stroke-width="1.2" filter="url(#shadow)" />
    <text x="100" y="25" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">MULTI-SENSOR L4 SST</text>
    <text x="100" y="40" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">(NRT Satellite Obs)</text>
    <text x="100" y="58" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#007bff">1 km | 2D Mosaic</text>
  </g>

  <!-- BLOCK 2: INGESTION -->
  <g transform="translate(475, 210)">
    <rect x="0" y="0" width="250" height="80" rx="10" fill="#e9ecef" stroke="#333" stroke-width="1.5" />
    <text x="125" y="35" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">📥 Data Acquisition</text>
    <text x="125" y="60" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" font-style="italic">fetch_copernicus.py</text>
  </g>

  <!-- BLOCK 3: PROCESSING ENGINE -->
  <rect x="50" y="330" width="1100" height="120" rx="10" fill="#f1f3f5" stroke="#adb5bd" stroke-width="1" stroke-dasharray="5,5" />
  <text x="250" y="355" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="start" fill="#495057">⚙️ Processing Engine (scripts/)</text>

  <g transform="translate(100, 370)">
    <rect x="0" y="0" width="250" height="60" rx="5" fill="#dee2e6" stroke="#333" stroke-width="1.2" />
    <text x="125" y="25" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">2D Mosaic Engine</text>
    <text x="125" y="45" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" font-style="italic">build_mesh.py</text>
  </g>
  <g transform="translate(475, 370)">
    <rect x="0" y="0" width="250" height="60" rx="5" fill="#dee2e6" stroke="#333" stroke-width="1.2" />
    <text x="125" y="25" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">3D Mesh Engine</text>
    <text x="125" y="45" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" font-style="italic">build_mesh_3d.py</text>
  </g>
  <g transform="translate(850, 370)">
    <rect x="0" y="0" width="250" height="60" rx="5" fill="#dee2e6" stroke="#333" stroke-width="1.2" />
    <text x="125" y="25" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Local Digital Twin</text>
    <text x="125" y="45" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" font-style="italic">build_obsea_local_dto.py</text>
  </g>

  <!-- BLOCK 4: DATASETS -->
  <rect x="50" y="490" width="1100" height="100" rx="10" fill="#ffffff" stroke="#007bff" stroke-width="1" stroke-dasharray="5,3" />
  <text x="250" y="515" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="start" fill="#007bff">💾 Processed Datasets (NetCDF)</text>

  <g transform="translate(100, 530)">
    <rect x="0" y="0" width="250" height="40" rx="5" fill="#e7f1ff" stroke="#007bff" stroke-width="1.2" />
    <text x="125" y="25" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">EUROPE_SST_UNIFIED.nc</text>
  </g>
  <g transform="translate(475, 530)">
    <rect x="0" y="0" width="250" height="40" rx="5" fill="#e7f1ff" stroke="#007bff" stroke-width="1.2" />
    <text x="125" y="25" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">EUROPE_TOTAL_3D_TEMP.nc</text>
  </g>
  <g transform="translate(850, 530)">
    <rect x="0" y="0" width="250" height="40" rx="5" fill="#e7f1ff" stroke="#007bff" stroke-width="1.2" />
    <text x="125" y="25" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">OBSEA_LOCAL_DTO_3D.nc</text>
  </g>

  <!-- BLOCK 5: VISUALIZATION -->
  <rect x="50" y="630" width="1100" height="120" rx="10" fill="#fff9db" stroke="#fab005" stroke-width="1" stroke-dasharray="5,5" />
  <text x="250" y="655" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="start" fill="#862e17">📊 Scientific Visualization</text>

  <g transform="translate(100, 670)">
    <rect x="0" y="0" width="250" height="60" rx="5" fill="#ffffff" stroke="#fab005" stroke-width="1.2" filter="url(#shadow)" />
    <text x="125" y="25" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">SST Maps</text>
    <text x="125" y="45" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" font-style="italic">plot_unified_sst.py</text>
  </g>
  <g transform="translate(475, 670)">
    <rect x="0" y="0" width="250" height="60" rx="5" fill="#ffffff" stroke="#fab005" stroke-width="1.2" filter="url(#shadow)" />
    <text x="125" y="25" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">3D Profiles &amp; Layers</text>
    <text x="125" y="45" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" font-style="italic">plot_3d_layers.py / profile.py</text>
  </g>
  <g transform="translate(850, 670)">
    <rect x="0" y="0" width="250" height="60" rx="5" fill="#ffffff" stroke="#fab005" stroke-width="1.2" filter="url(#shadow)" />
    <text x="125" y="25" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Local DTO Analysis</text>
    <text x="125" y="45" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" font-style="italic">plot_obsea_local_dto.py</text>
  </g>

  <!-- BLOCK 6: ERDDAP SERVICE -->
  <g transform="translate(400, 820)">
    <rect x="0" y="0" width="400" height="100" rx="20" fill="#212529" stroke="#000" stroke-width="1" />
    <text x="200" y="40" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#ffffff">🌐 ERDDAP Service</text>
    <line x1="50" y1="55" x2="350" y2="55" stroke="#444" />
    <text x="200" y="80" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#00d2ff" font-weight="bold">Unified Data Access API (Docker)</text>
  </g>

  <!-- CONNECTORS -->
  <!-- Sources to Fetch (Converging) -->
  <path d="M200,140 L200,180 L600,180 L600,208" fill="none" stroke="#444" stroke-width="1.5" marker-end="url(#arrowhead)" />
  <path d="M450,140 L450,180 L600,180" fill="none" stroke="#444" stroke-width="1.5" />
  <path d="M700,140 L700,180 L600,180" fill="none" stroke="#444" stroke-width="1.5" />
  <path d="M950,140 L950,180 L600,180" fill="none" stroke="#444" stroke-width="1.5" />

  <!-- Fetch to 3 Processing Engines -->
  <path d="M600,290 L600,310 L225,310 L225,368" fill="none" stroke="#444" stroke-width="1.5" marker-end="url(#arrowhead)" />
  <line x1="600" y1="290" x2="600" y2="368" stroke="#444" stroke-width="1.5" marker-end="url(#arrowhead)" />
  <path d="M600,290 L600,310 L975,310 L975,368" fill="none" stroke="#444" stroke-width="1.5" marker-end="url(#arrowhead)" />

  <!-- Processing to Datasets -->
  <line x1="225" y1="430" x2="225" y2="528" stroke="#444" stroke-width="1.5" marker-end="url(#arrowhead)" />
  <line x1="600" y1="430" x2="600" y2="528" stroke="#444" stroke-width="1.5" marker-end="url(#arrowhead)" />
  <line x1="975" y1="430" x2="975" y2="528" stroke="#444" stroke-width="1.5" marker-end="url(#arrowhead)" />
  
  <!-- Special: Mesh3D to DTO (Dashed) -->
  <path d="M725,400 L850,400" fill="none" stroke="#adb5bd" stroke-width="1.5" stroke-dasharray="5,2" marker-end="url(#arrowhead)" />

  <!-- Datasets to Vis -->
  <line x1="225" y1="570" x2="225" y2="668" stroke="#444" stroke-width="1.5" marker-end="url(#arrowhead)" />
  <line x1="600" y1="570" x2="600" y2="668" stroke="#444" stroke-width="1.5" marker-end="url(#arrowhead)" />
  <line x1="975" y1="570" x2="975" y2="668" stroke="#444" stroke-width="1.5" marker-end="url(#arrowhead)" />

  <!-- Final Dashed Arrows to ERDDAP (Starting from Visualization blocks) -->
  <!-- Col 1: Vis to ERDDAP -->
  <path d="M225,730 L225,790 L500,790 L500,818" fill="none" stroke="#007bff" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arrowhead)" />
  <!-- Col 2: Vis to ERDDAP -->
  <line x1="600" y1="730" x2="600" y2="818" stroke="#007bff" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arrowhead)" />
  <!-- Col 3: Vis to ERDDAP -->
  <path d="M975,730 L975,790 L700,790 L700,818" fill="none" stroke="#007bff" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arrowhead)" />

</svg>
